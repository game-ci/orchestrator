name: Engine Smoke Tests

on:
  push:
    branches: [main, 'release/**', 'feat/**']
  pull_request:
    branches: [main, 'release/**']
  workflow_dispatch:
    inputs:
      godot-version:
        description: 'Godot version tag for barichello/godot-ci image'
        required: false
        default: '4.3'
      unreal-image:
        description: 'Custom Unreal Engine Docker image (optional, leave empty to skip UE test)'
        required: false
        default: ''

jobs:
  # ─── Godot Smoke Test ────────────────────────────────────────────
  godot-smoke-test:
    name: Godot smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build orchestrator
        run: yarn build

      - name: Verify Godot container can run
        run: |
          GODOT_VERSION="${{ github.event.inputs.godot-version || '4.3' }}"
          echo "Testing with Godot ${GODOT_VERSION}..."

          # Pull the Godot CI image
          docker pull "barichello/godot-ci:${GODOT_VERSION}"

          # Verify Godot runs and reports version
          docker run --rm "barichello/godot-ci:${GODOT_VERSION}" \
            godot --headless --version

          echo "Godot container verified successfully"

      - name: Test serve command protocol (Godot project context)
        run: |
          # Test that the serve command can parse a request and respond with JSON
          # Use the test provider to avoid needing real cloud credentials
          RESPONSE=$(echo '{"command":"list-resources","params":{}}' | \
            node dist/cli.js serve \
              --provider-strategy test \
              --engine godot \
              --project-path test-projects/godot-minimal \
              2>/dev/null | tail -1) || true

          echo "Response: ${RESPONSE}"

          # Verify it's valid JSON with success/error field
          echo "${RESPONSE}" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));
            if (!('success' in data)) throw new Error('Missing success field');
            console.log('Protocol response valid:', data.success ? 'success' : 'error: ' + data.error);
          "

          echo "Serve protocol smoke test PASSED"

      - name: Test orchestrator dispatches to Godot container (local-docker)
        run: |
          GODOT_VERSION="${{ github.event.inputs.godot-version || '4.3' }}"

          # Use serve command with local-docker provider to run a command in Godot container
          RESPONSE=$(echo '{"command":"run-task","params":{"buildGuid":"smoke-test","image":"barichello/godot-ci:'"${GODOT_VERSION}"'","commands":"godot --headless --version","mountdir":"/build","workingdir":"/build","environment":[],"secrets":[]}}' | \
            node dist/cli.js serve \
              --provider-strategy local-docker \
              --engine godot \
              --project-path test-projects/godot-minimal \
              2>dispatch-stderr.log | tail -1) || true

          echo "Response: ${RESPONSE}"
          echo "--- stderr ---"
          cat dispatch-stderr.log || true

          echo "Godot dispatch smoke test complete"

  # ─── Unreal Engine Smoke Test (manual trigger only) ──────────────
  unreal-smoke-test:
    name: Unreal Engine smoke test
    runs-on: ubuntu-latest
    if: github.event.inputs.unreal-image != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build orchestrator
        run: yarn build

      - name: Pull Unreal Engine image
        run: |
          UE_IMAGE="${{ github.event.inputs.unreal-image }}"
          echo "Pulling Unreal Engine image: ${UE_IMAGE}"
          docker pull "${UE_IMAGE}"

      - name: Verify Unreal Engine container
        run: |
          UE_IMAGE="${{ github.event.inputs.unreal-image }}"

          # Try to get UE version - the command varies by image
          docker run --rm "${UE_IMAGE}" \
            bash -c "echo 'Unreal Engine container started successfully' && ls /home/ue4 2>/dev/null || ls /opt/unreal 2>/dev/null || echo 'UE directory listing skipped'"

      - name: Test serve command with Unreal project
        run: |
          UE_IMAGE="${{ github.event.inputs.unreal-image }}"

          echo '{"command":"run-task","params":{"buildGuid":"ue-smoke","image":"'"${UE_IMAGE}"'","commands":"echo UE container running","mountdir":"/build","workingdir":"/build","environment":[],"secrets":[]}}' | \
            node dist/cli.js serve \
              --provider-strategy local-docker \
              --engine unreal \
              --project-path test-projects/unreal-minimal \
              2>ue-stderr.log || true

          echo "--- UE stderr ---"
          cat ue-stderr.log || true
          echo "--- end stderr ---"

          echo "Unreal Engine dispatch smoke test complete"

  # ─── Protocol Integration Test ───────────────────────────────────
  serve-protocol-test:
    name: Serve protocol integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build orchestrator
        run: yarn build

      - name: Test serve command handles all subcommands
        run: |
          COMMANDS=("list-resources" "list-workflow" "watch-workflow" "garbage-collect")
          for cmd in "${COMMANDS[@]}"; do
            echo "Testing serve command: ${cmd}"
            RESPONSE=$(echo "{\"command\":\"${cmd}\",\"params\":{}}" | \
              node dist/cli.js serve --provider-strategy test 2>/dev/null | tail -1) || true
            echo "  Response: ${RESPONSE}"

            # Verify response is valid JSON with success field
            echo "${RESPONSE}" | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));
              if (!('success' in data)) process.exit(1);
            " || { echo "FAIL: Invalid protocol response for ${cmd}"; exit 1; }
          done

          echo "All protocol commands tested OK"

      - name: Test serve command rejects invalid input
        run: |
          # Empty stdin — should return error JSON
          RESPONSE=$(echo "" | node dist/cli.js serve --provider-strategy test 2>/dev/null | tail -1) || true
          echo "Empty stdin: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"success":false' || { echo "FAIL: expected error"; exit 1; }

          # Invalid JSON — should return error JSON
          RESPONSE=$(echo "not json" | node dist/cli.js serve --provider-strategy test 2>/dev/null | tail -1) || true
          echo "Invalid JSON: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"success":false' || { echo "FAIL: expected error"; exit 1; }

          # Missing command field — should return error JSON
          RESPONSE=$(echo '{"params":{}}' | node dist/cli.js serve --provider-strategy test 2>/dev/null | tail -1) || true
          echo "Missing command: ${RESPONSE}"
          echo "${RESPONSE}" | grep -q '"success":false' || { echo "FAIL: expected error"; exit 1; }

          echo "Error handling tests PASSED"
