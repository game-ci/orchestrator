  # ============================================================================
  # LOCAL DOCKER TESTS
  # ============================================================================
  local-docker-tests:
    name: Local Docker Provider Tests
    runs-on: ubuntu-latest
    steps:
      # --- Setup ---
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-node-20-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-node-20-

      - name: Define cleanup functions
        run: |
          cat > /tmp/cleanup-functions.sh << 'CLEANUP_EOF'
          light_cleanup() {
            echo "--- Light cleanup ---"
            rm -rf ./orchestrator-cache/* || true
            docker system prune -f || true
            df -h
          }

          heavy_cleanup() {
            echo "--- Heavy cleanup ---"
            rm -rf ./orchestrator-cache/* || true
            docker system prune -af --volumes || true
            df -h
          }
          CLEANUP_EOF
          echo "Cleanup functions defined at /tmp/cleanup-functions.sh"

      - name: Initial disk space cleanup
        run: |
          echo "Initial disk space cleanup..."
          df -h
          docker system prune -af --volumes || true
          echo "Disk usage after cleanup:"
          df -h

      - name: Start MiniStack (for S3-dependent local-docker tests)
        run: |
          echo "Starting MiniStack for S3-dependent tests..."
          docker run -d \
            --name localstack-main \
            -p 4566:4566 \
            -e SERVICES=s3,cloudformation \
            -e DEBUG=0 \
            ministackorg/ministack || true
          echo "Waiting for MiniStack to be ready..."
          MAX_ATTEMPTS=60
          READY=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if ! docker ps | grep -q localstack-main; then
              sleep 2
              continue
            fi
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then
              echo "MiniStack is ready (attempt $i/$MAX_ATTEMPTS)"
              READY=true
              break
            fi
            sleep 2
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: MiniStack did not become ready"
            docker logs localstack-main --tail 100 || true
            exit 1
          fi

      - name: Install AWS CLI and create S3 bucket
        run: |
          if ! command -v aws > /dev/null 2>&1; then pip install awscli || true; fi
          MAX_RETRIES=5
          RETRY_COUNT=0
          BUCKET_CREATED=false
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$BUCKET_CREATED" != "true" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if command -v aws > /dev/null 2>&1; then
              if aws --endpoint-url=http://localhost:4566 s3 mb s3://"$AWS_STACK_NAME" 2>&1; then BUCKET_CREATED=true; else sleep 2; fi
            else
              echo "aws CLI not available"; exit 1
            fi
          done
          if [ "$BUCKET_CREATED" != "true" ]; then
            echo "ERROR: Failed to create S3 bucket"; exit 1
          fi

