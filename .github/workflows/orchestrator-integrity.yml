      # --- Docker Test 4: orchestrator-locking-core (with S3) ---
      - name: Run orchestrator-locking-core test (local-docker with S3)
        timeout-minutes: 30
        run: yarn vitest run "orchestrator-locking-core" --no-file-parallelism
