  # ============================================================================
  # RCLONE TESTS
  # ============================================================================
  rclone-tests:
    name: Rclone Provider Tests
    runs-on: ubuntu-latest
    steps:
      # --- Setup ---
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-node-20-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-node-20-

      - name: Initial disk space cleanup
        run: |
          echo "Initial disk space cleanup..."
          docker system prune -af --volumes || true
          df -h

      - name: Start MiniStack
        run: |
          echo "Starting MiniStack for rclone S3 backend..."
          docker run -d \
            --name localstack-main \
            -p 4566:4566 \
            -e SERVICES=s3 \
            -e DEBUG=0 \
            ministackorg/ministack || true
          echo "Waiting for MiniStack to be ready..."
          MAX_ATTEMPTS=60
          READY=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if ! docker ps | grep -q localstack-main; then sleep 2; continue; fi
            if curl -sf http://localhost:4566 > /dev/null 2>&1; then
              echo "MiniStack is ready (attempt $i/$MAX_ATTEMPTS)"
              READY=true
              break
            fi
            sleep 2
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: MiniStack did not become ready"
            docker logs localstack-main --tail 100 || true
            exit 1
          fi

      - name: Install AWS CLI and create S3 bucket
        run: |
          if ! command -v aws > /dev/null 2>&1; then pip install awscli || true; fi
          MAX_RETRIES=5
          RETRY_COUNT=0
          BUCKET_CREATED=false
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$BUCKET_CREATED" != "true" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if command -v aws > /dev/null 2>&1; then
              if aws --endpoint-url=http://localhost:4566 s3 mb s3://"$AWS_STACK_NAME" 2>&1; then BUCKET_CREATED=true; else sleep 2; fi
            else
              echo "aws CLI not available"; exit 1
            fi
          done
          if [ "$BUCKET_CREATED" != "true" ]; then
            echo "ERROR: Failed to create S3 bucket"; exit 1
          fi

      - name: Install and configure rclone with MiniStack S3
        run: |
          echo "Installing rclone..."
          curl https://rclone.org/install.sh | sudo bash
          rclone version

          echo "Configuring rclone to use MiniStack S3..."
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [ministack-s3]
          type = s3
          provider = Other
          env_auth = false
          access_key_id = test
          secret_access_key = test
          endpoint = http://localhost:4566
          acl = private
          force_path_style = true
          EOF

          echo "Testing rclone configuration..."
          rclone lsd ministack-s3: || echo "No buckets yet (expected)"
          rclone ls ministack-s3:game-ci-team-pipelines || echo "Bucket may be empty"
          echo "Rclone configured successfully"

      - run: yarn install --immutable
      - run: yarn build

      # --- Rclone Test 1: orchestrator-rclone-steps ---
      - name: Run orchestrator-rclone-steps test
        timeout-minutes: 30
        run: yarn vitest run "orchestrator-rclone-steps" --no-file-parallelism
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          TARGET_PLATFORM: StandaloneLinux64
          orchestratorTests: true
          versioning: None
          PROVIDER_STRATEGY: local-docker
          RCLONE_REMOTE: 'ministack-s3:game-ci-team-pipelines'
          rcloneRemote: 'ministack-s3:game-ci-team-pipelines'
          GIT_PRIVATE_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}

      # --- Final cleanup ---
      - name: Final cleanup
        if: always()
        run: |
          rm -rf ./orchestrator-cache/* || true
          docker stop localstack-main 2>/dev/null || true
          docker rm localstack-main 2>/dev/null || true
          docker system prune -af --volumes || true
          df -h

  # ============================================================================
  # MOCK AWS TESTS (sibling to MiniStack — no external dependencies)
  # ============================================================================
  mock-aws-tests:
    name: Mock AWS Provider Tests
    runs-on: ubuntu-latest
    env:
      PROVIDER_STRATEGY: mock-aws
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Read Node version from mise.toml
        id: node
        run: echo "version=$(grep -E '^node\\s*=' mise.toml | sed -E 's/.*"([^"]+)".*/\\1/')" >> "$GITHUB_OUTPUT"
      - name: Install package manager (from package.json)
        run: |
          corepack enable
          corepack install
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
      - name: Resolve yarn cache folder
        id: yarn-config
        run: echo "cacheFolder=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Restore yarn install cache (node_modules + cacheFolder + install-state)
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ${{ steps.yarn-config.outputs.cacheFolder }}
            .yarn/install-state.gz
          key: yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-node${{ steps.node.outputs.version }}-
      - name: Install deps
        env:
          YARN_ENABLE_HARDENED_MODE: 'false'
        run: |
          case "$(yarn --version)" in 1.*) echo 'expected up-to-date yarn version'; exit 1 ;; esac
          yarn install --immutable
      - run: yarn build
      # --- Mock AWS unit tests (CloudFormation, ECS, S3, Kinesis, CloudWatch) ---
      - name: Run mock AWS service tests
        run: yarn vitest run src/model/orchestrator/providers/mock-aws/mock-aws.test.ts --coverage=false

      # --- Mock AWS provider integration (exercises full ProviderInterface) ---
      - name: Validate mock-aws provider loads
        run: |
          node -e "
            const loadProvider = require('./dist/model/orchestrator/providers/provider-loader').default;
            const BuildParameters = require('./dist/model/build-parameters').default;
            const bp = new BuildParameters();
            bp.awsStackName = 'mock-test-stack';
            loadProvider('mock-aws', bp).then(provider => {
              console.log('Mock AWS provider loaded successfully');
              console.log('Methods:', Object.getOwnPropertyNames(Object.getPrototypeOf(provider)).filter(m => m !== 'constructor'));
            }).catch(err => {
              console.error('Failed:', err.message);
              process.exit(1);
            });
          "

      # --- Test full workflow: setup → run task → cleanup ---
      - name: Test mock-aws full workflow
        run: |
          node -e "
            const loadProvider = require('./dist/model/orchestrator/providers/provider-loader').default;
            const BuildParameters = require('./dist/model/build-parameters').default;

            async function main() {
              const bp = new BuildParameters();
              bp.awsStackName = 'game-ci-mock-integration';

              const provider = await loadProvider('mock-aws', bp);

              // Setup
              await provider.setupWorkflow('test-guid', bp, 'main', []);
              console.log('setupWorkflow: OK');

              // Run task
              const output = await provider.runTaskInWorkflow(
                'test-guid',
                'barichello/godot-ci:4.3',
                'echo hello from mock',
                '/build',
                '/build',
                [{ name: 'CI', value: 'true' }],
                []
              );
              console.log('runTaskInWorkflow output:', output.substring(0, 200));

              // List resources
              const resources = await provider.listResources();
              console.log('listResources:', resources.length, 'resources');

              // Garbage collect
              const gcResult = await provider.garbageCollect('', false, 0, false, false);
              console.log('garbageCollect:', gcResult);

              // Cleanup
              await provider.cleanupWorkflow(bp, 'main', []);
              console.log('cleanupWorkflow: OK');

              console.log('=== Mock AWS full workflow test PASSED ===');
            }

            main().catch(err => { console.error(err); process.exit(1); });
          "
