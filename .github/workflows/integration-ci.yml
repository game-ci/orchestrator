name: Integration CI

on:
  workflow_call:

permissions:
  contents: read
  checks: write
  statuses: write

env:
  AWS_STACK_NAME: game-ci-team-pipelines
  DEBUG: true
  PROJECT_PATH: test-project

jobs:
  # ============================================================================
  # AWS + LOCALSTACK SMOKE TEST
  # ============================================================================
  # Validates:
  #   - CloudFormation template generation (aws-local mode)
  #   - S3 integration via LocalStack
  #   - aws-local fallback (Fargate → local-docker with template validation)
  # ============================================================================
  aws-localstack-smoke:
    name: AWS + LocalStack Smoke
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT: http://localhost:4566
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_FORCE_PROVIDER: aws-local
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack-main \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -p 4566:4566 \
            -e SERVICES=s3,cloudformation,ecs,kinesis,cloudwatch,logs,iam,secretsmanager \
            -e DEBUG=0 \
            localstack/localstack:4
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 60); do
            HEALTH=$(curl -s http://localhost:4566/_localstack/health 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"s3"'; then
              echo "LocalStack is ready (attempt $i/60)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: LocalStack did not become ready"
              docker logs localstack-main --tail 100 || true
              exit 1
            fi
            sleep 2
          done

      - name: Create S3 bucket
        run: |
          pip install awscli-local
          for i in $(seq 1 5); do
            if awslocal s3 mb s3://$AWS_STACK_NAME 2>&1; then
              echo "Bucket created successfully"
              break
            fi
            if [ "$i" -eq 5 ]; then echo "ERROR: Failed to create S3 bucket"; exit 1; fi
            sleep 2
          done

      - run: yarn install --frozen-lockfile
      - run: yarn build

      # Test 1: AWS provider with aws-local mode (validates CloudFormation templates, executes via local-docker)
      - name: 'Test: orchestrator-image (aws-local mode)'
        timeout-minutes: 10
        run: yarn run test "orchestrator-image" --detectOpenHandles --forceExit --runInBand
        env:
          PROVIDER_STRATEGY: aws
          orchestratorTests: true
          TARGET_PLATFORM: StandaloneWindows64
          versioning: None
          GIT_PRIVATE_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}

      - name: Light cleanup
        if: always()
        run: |
          rm -rf ./orchestrator-cache/* || true
          docker system prune -f || true

      # Test 2: S3 integration via LocalStack (local-docker provider + S3 hooks)
      - name: 'Test: orchestrator-s3-steps (local-docker + LocalStack S3)'
        timeout-minutes: 15
        run: yarn run test "orchestrator-s3-steps" --detectOpenHandles --forceExit --runInBand
        env:
          PROVIDER_STRATEGY: local-docker
          orchestratorTests: true
          TARGET_PLATFORM: StandaloneLinux64
          versioning: None
          AWS_S3_ENDPOINT: http://localhost:4566
          INPUT_AWSS3ENDPOINT: http://localhost:4566
          INPUT_AWSENDPOINT: http://localhost:4566
          AWS_S3_FORCE_PATH_STYLE: 'true'
          AWS_EC2_METADATA_DISABLED: 'true'
          GIT_PRIVATE_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}

      - name: Final cleanup
        if: always()
        run: |
          rm -rf ./orchestrator-cache/* || true
          docker stop localstack-main 2>/dev/null || true
          docker rm localstack-main 2>/dev/null || true
          docker system prune -af --volumes || true

  # ============================================================================
  # K8S + K3D SMOKE TEST
  # ============================================================================
  # Validates:
  #   - K8s Job creation and pod scheduling via k3d
  #   - PVC creation and binding
  #   - LocalStack S3 connectivity from k3d pods
  # ============================================================================
  k8s-smoke:
    name: K8s + k3d Smoke
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_FORCE_PROVIDER: aws-local
      K8S_LOCALSTACK_HOST: localstack-main
      RESOURCE_TRACKING: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.1'

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version | cat

      - name: Initial cleanup and network setup
        run: |
          docker system prune -af --volumes || true
          docker network rm orchestrator-net 2>/dev/null || true
          docker network create orchestrator-net

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack-main \
            --network orchestrator-net \
            --add-host=host.docker.internal:host-gateway \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -p 4566:4566 \
            -e SERVICES=s3,cloudformation,ecs,kinesis,cloudwatch,logs,iam,secretsmanager \
            -e DEBUG=0 \
            -e HOSTNAME_EXTERNAL=localstack-main \
            localstack/localstack:4
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 60); do
            HEALTH=$(curl -s http://localhost:4566/_localstack/health 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"s3"'; then
              echo "LocalStack is ready (attempt $i/60)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: LocalStack did not become ready"
              docker logs localstack-main --tail 100 || true
              exit 1
            fi
            sleep 2
          done

      - name: Create S3 bucket
        run: |
          pip install awscli-local
          for i in $(seq 1 5); do
            if awslocal s3 mb s3://$AWS_STACK_NAME 2>&1; then
              echo "Bucket created successfully"
              break
            fi
            if [ "$i" -eq 5 ]; then echo "ERROR: Failed to create S3 bucket"; exit 1; fi
            sleep 2
          done

      - name: Create k3d cluster
        timeout-minutes: 5
        run: |
          k3d cluster create unity-builder \
            --agents 1 \
            --network orchestrator-net \
            --wait
          kubectl config current-context | cat

      - name: Verify cluster and LocalStack connectivity
        timeout-minutes: 2
        run: |
          for i in $(seq 1 60); do
            if kubectl get nodes 2>/dev/null | grep -q Ready; then
              echo "Cluster is ready"
              break
            fi
            echo "Waiting for cluster... ($i/60)"
            sleep 5
          done
          kubectl get nodes
          kubectl get storageclass
          LOCALSTACK_IP=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' localstack-main 2>/dev/null || echo "")
          echo "LocalStack container IP: $LOCALSTACK_IP"
          echo "LOCALSTACK_IP=$LOCALSTACK_IP" >> $GITHUB_ENV

      - run: yarn install --frozen-lockfile
      - run: yarn build

      # Test: K8s provider with k3d cluster
      - name: 'Test: orchestrator-image (k8s)'
        timeout-minutes: 10
        run: yarn run test "orchestrator-image" --detectOpenHandles --forceExit --runInBand
        env:
          PROVIDER_STRATEGY: k8s
          orchestratorTests: true
          TARGET_PLATFORM: StandaloneWindows64
          versioning: None
          KUBE_STORAGE_CLASS: local-path
          KUBE_VOLUME_SIZE: 2Gi
          containerCpu: '512'
          containerMemory: '512'
          AWS_S3_ENDPOINT: http://localhost:4566
          AWS_ENDPOINT: http://localhost:4566
          INPUT_AWSS3ENDPOINT: http://localhost:4566
          INPUT_AWSENDPOINT: http://localhost:4566
          AWS_S3_FORCE_PATH_STYLE: 'true'
          AWS_EC2_METADATA_DISABLED: 'true'
          GIT_PRIVATE_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GIT_PRIVATE_TOKEN }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}

      - name: Final cleanup
        if: always()
        run: |
          kubectl delete jobs --all --ignore-not-found=true -n default || true
          kubectl get pods -n default -o name 2>/dev/null | grep -E "(unity-builder-job-|helper-pod-)" | while read pod; do
            kubectl delete "$pod" --ignore-not-found=true || true
          done || true
          kubectl get pvc -n default -o name 2>/dev/null | grep "unity-builder-pvc-" | while read pvc; do
            kubectl delete "$pvc" --ignore-not-found=true || true
          done || true
          k3d cluster delete unity-builder || true
          docker stop localstack-main 2>/dev/null || true
          docker rm localstack-main 2>/dev/null || true
          docker system prune -af --volumes || true
